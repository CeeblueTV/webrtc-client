<html lang="en">
    <head>
        <title>Ceeblue WebRTC Player Example</title>
        <meta charset="utf-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">

        <link rel="icon" href="./assets/ceeblue-logo-32x32.png" sizes="32x32">
        <link rel="icon" href="./assets/ceeblue-logo-192x192.png" sizes="192x192">

        <link href="./css/bootstrap.css" rel="stylesheet">
        <link href="./css/solid.css" rel="stylesheet">
        <link href="./css/fontawesome.css" rel="stylesheet">

        <style>
            body {
                margin-top: 1em;
                margin-bottom: 3em;
                background-color: #EDF0F3;
            }

            .card-body {
                background-color: #EDF0F3;
            }

            video {
                background-color: #333333;
                max-width: 100%;
                max-height: 60vh;
            }

            .nav .nav-item .nav-link {
                padding: .5rem .8rem;
            }

            [v-cloak] {
                display: none;
            }
        </style>
    </head>
    <body class="container">
        <div class="row">
            <div class="col-md-12">
                <img alt="CEEBLUE Media Services" class="rounded mx-auto d-block" src="./assets/ceeblue-logo.png">
                <h3 class="text-center">WebRTC Client Player Example</h3>
            </div>

            <div class="col-md-12" id="main">

                <div class="card text-center border-0">
                    <div class="card-body">
                        <div class="alert alert-warning" role="alert" v-if="streamErrorMessage">
                            {{ streamErrorMessage }}
                        </div>

                        <video autoplay id="video" ref="video" playsinline></video>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-sm">
                        <select id="video-track-selection" class="custom-select text-center"
                            :disabled="!player || !player.controller" v-model="videoTrackId" @change="onVideoTrackChange()">
                            <option :value="undefined" :key="videoTrack">AUTO - {{videoTrack}}</option>
                            <option v-for="[idx, track] of videoTracks" v-bind:value="idx">
                                {{ track }}
                            </option>
                        </select>
                    </div>

                    <div class="form-group col-sm">
                        <select id="audio-track-selection" class="custom-select text-center"
                            :disabled="!player || !player.controller" v-model="audioTrackId" @change="onAudioTrackChange()">
                            <option :value="undefined" :key="audioTrack">AUTO - {{audioTrack}}</option>
                            <option v-for="[idx, track] of audioTracks" v-bind:value="idx">
                                {{ track }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-2 col-sm-1">
                        <button class="btn btn-light" type="button" v-on:click="mute">
                            <i class="fas" v-bind:class="{ 'fa-volume-up': !muted, 'fa-volume-off': muted }"></i>
                        </button>
                    </div>

                    <div class="form-group col-10 col-sm">
                        <select class="custom-select"
                            :disabled="isPlaying()" v-model="connectorType">
                            <option v-bind:value="option" v-for="option in connectorTypes">
                                {{ option }}
                            </option>
                        </select>
                    </div>

                    <div class="form-group col-sm">
                        <input :disabled="isPlaying()" class="form-control"
                            placeholder="Stream name as+30189afc-541d-49b7-9ae0-468d15f62059" type="text"
                            v-model="streamName">
                    </div>

                    <div class="form-group col-sm">
                        <input :disabled="isPlaying()" class="form-control"
                            placeholder="Access token cc0f52bb-92bb-462b-8218-88c3febe8533" type="text" v-model="accessToken">
                    </div>
                </div>

                <div class="d-flex justify-content-center" v-cloak>
                    <button class="btn" type="button"
                        v-bind:class="{ 'btn-danger': isPlaying(), 'btn-success': isStopped(), 'btn-secondary': isStarting() }"
                        v-on:click="play">
                        <span>
                            {{ playButtonCaption() }} <i class="fas fa-spinner fa-pulse" v-if="isStarting()"></i>
                        </span>
                    </button>

                </div>
                <div class="form-row">
                    <ul class="list-group list-group-flush" ref="stats" style="width: 100%;">
                    </ul>
                </div>
            </div>
        </div>

        <script type="module">
            import { Player, HTTPConnector, WSController, VERSION, utils } from "../dist/webrtc-client.bundle.js";
            // development version, includes helpful console warnings
            // import { createApp } from 'https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js';
            // production version, optimized for size and speed
            import { createApp } from 'https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.prod.js';

            const { Util, Connect, log, UIMetrics } = utils;
            log('webrtc-client version:', VERSION).info();
            log('web-utils version:', utils.VERSION).info();

            const PlayState = {
                PLAYING: 'PLAYING',
                STARTING: 'STARTING',
                STOPPED: 'STOPPED'
            };

            createApp({
                data() {
                    return {
                        PlayState: PlayState,
                        playState: PlayState.STOPPED,

                        streamName: '',
                        accessToken: null,
                        muted: true,
                        endPoint: null,

                        streamMetadata: null,
                        videoTracks: new Map(),
                        videoTrack: 'Video',
                        videoTrackId: undefined,
                        connectorType:'WebSocket (WS)',
                        connectorTypes:['WebSocket (WS)', 'WHEP (HTTP)'],
                        audioTracks: new Map(),
                        audioTrack: 'Audio',
                        audioTrackId: undefined,
                        streamErrorMessage: null,

                        stats: new Map(),
                        uiStats: null, 
                    }
                },
                mounted() {
                    const options = Util.caseInsensitive(Util.options());
                    // init values
                    const params = {
                        endPoint: options.endPoint?.toLowerCase() || location.hostname,
                        streamName: options.streamName,
                        accessToken: options.accessToken
                    }
                    options.whip ||= params.endPoint.startsWith('http');

                    // WIP change UI to have just one input for endPoint (OR streamName)?
                    // In this case we can remove this buildURL here just to unpack streamName from endPoint when set
                    Connect.buildURL(Connect.Type.WEBRTC, params, options.whip ? 'https' : 'wss');
                    this.endPoint = params.endPoint;
                    this.streamName = params.streamName;
                    this.accessToken = params.accessToken;
                    this.connectorType = options.whip ? this.connectorTypes[1] : this.connectorTypes[0];
                    

                    this.uiStats = new UIMetrics(this.$refs.stats);
                    // Stats in display order
                    const bandwidths = []; this.stats.set("Bandwidth", bandwidths);
                    const bufferAmounts = []; this.stats.set("Buffer", bufferAmounts);
                    const playbackSpeeds = []; this.stats.set("Playback speed", playbackSpeeds);
                    const fps = []; this.stats.set("Video FPS", fps);
                    const trackAudio = []; this.stats.set("Track audio", trackAudio);
                    const trackVideo = []; this.stats.set("Track video", trackVideo);
                    const skippedAudio = []; this.stats.set("Skipped audio", skippedAudio);
                    const skippedVideo = []; this.stats.set("Skipped video", skippedVideo);
                    const stalls = []; this.stats.set("Stalls", stalls);

                    this.prevTimeMs = performance.now();

                    setInterval(async () => {
                        const player = this.player;
                        if (player) {
                            const videoElement = this.$refs.video;
                            
                            bandwidths.push((player.bandwidth * 8).toFixed(0) + 'kbps');
                            bufferAmounts.push(player.bufferAmount.toFixed(0) + 'ms');
                            fps.push(player.fps);
                            skippedAudio.push(player.skippedAudio.toFixed(1) + 's');
                            skippedVideo.push(player.skippedVideo.toFixed(1) + 's');
                            stalls.push(player.stalls);

                            const tracks = player.metadata?.tracks;
                            if (tracks) {
                                const audioTrack = tracks.get(player.audioTrack);
                                const videoTrack = tracks.get(player.videoTrack);
                                if (audioTrack) {
                                    trackAudio.push((audioTrack.bps * 8 / 1000).toFixed(0) + 'kbps' );
                                }
                                if (videoTrack) {
                                    trackVideo.push((videoTrack.bps * 8 / 1000).toFixed(0) + 'kbps' );
                                }
                            }
                            
                            // Playback speed, calculated here to have access to videoElement.currentTime
                            const now = performance.now();
                            const videoTime = videoElement.currentTime ?? 0;
                            let measuredSpeed = 0;
                            if (this.prevVideoTime !== null && this.prevRealTime !== null) {
                                const deltaVideoTime = videoTime - this.prevVideoTime;
                                const deltaRealTime = (now - this.prevRealTime) / 1000;
                                if (deltaVideoTime >= 0 && deltaRealTime > 0.05) {
                                    measuredSpeed = deltaVideoTime / deltaRealTime;
                                }
                            }
                            this.prevVideoTime = videoTime;
                            this.prevRealTime = now;
                            playbackSpeeds.push(measuredSpeed.toFixed(2));
                        }
                        this.uiStats.display(this.stats);

                    }, 700);
                    },
        
                methods: {
                    play() {
                        if (this.player) {
                            this.player.stop();
                            return;
                        }
                        this.streamErrorMessage = null;
                        if (!this.streamName) {
                            this.streamErrorMessage = "Enter a non-empty stream name to play";
                            return;
                        }
                        this.playState = PlayState.STARTING;

                        const videoElement = this.$refs.video;
                        videoElement.muted = this.muted;
                        videoElement.autoplay = true;
                        videoElement.onloadeddata = () => {
                            log('WebRTC loadeddata').info();
                            videoElement.play();
                        };

                        this.player = new Player(this.connectorType.startsWith('WebSocket') ? WSController : HTTPConnector);
                        this.player.onStart = this.onStart.bind(this);
                        this.player.onStop = this.onStop.bind(this);
                        this.player.onPlaying = this.onPlaying.bind(this);
                        this.player.onMetadata = this.onMetadata.bind(this);
                        this.player.start(
                            {
                                endPoint:this.endPoint,
                                streamName: this.streamName,
                                accessToken: this.accessToken
                            });

                    },
                    onStart(stream) {
                        log('onStart').info();
                        this.playState = PlayState.PLAYING;
                        this.$refs.video.srcObject = stream;
                    },
                    onStop(error) {
                        if(error) {
                            log('onStop', error).error();
                            this.streamErrorMessage = error.name;
                        } else {
                            log('onStop').info();
                        }
                        const videoElement = this.$refs.video;
                        videoElement.srcObject = null;
                        videoElement.onloadeddata = null;
                        this.audioTracks = new Map();
                        this.audioTrack = 'Audio';
                        this.audioTrackId = undefined;
                        this.videoTracks = new Map();
                        this.videoTrack = 'Video';
                        this.videoTrackId = undefined;

                        this.player = null;
                        this.playState = PlayState.STOPPED;
                    },
                    onPlaying(playing) {
                        if(this.videoTrackId != null) {
                            this.videoTrackId = this.player.videoTrack;
                        }
                        this.videoTrack = this.videoTracks.get(this.player.videoTrack);
                        if(this.audioTrackId != null) {
                            this.audioTrackId = this.player.audioTrack;
                        }
                        this.audioTrack = this.audioTracks.get(this.player.audioTrack);

                        log(
                            'Position ' + playing.begin + '>>[' + playing.current + ']>>' + playing.end,
                            {
                                Buff:(playing.end - playing.current) + 'ms',
                                audioTrack: this.audioTrackId,
                                videoTrack: this.videoTrackId
                            }
                        ).debug();
                    },
                    onMetadata(metadata) {
                        log(`onMetadata ${Util.stringify(metadata)}`).info();

                        this.audioTracks = new Map();
                        this.videoTracks = new Map();

                        for (const [id, track] of metadata.tracks) {
                            if (track.type === 'video') {
                                this.videoTracks.set(
                                    id,
                                    `${track.codec} ${track.width}x${track.height} ${(track.bps * 8 / 1000).toFixed(0)} kbps`
                                );
                            } else if (track.type === 'audio') {
                                this.audioTracks.set(
                                    id,
                                    `${track.codec} ${track.channels}ch ${track.rate}Hz ${(track.bps * 8 / 1000).toFixed(0)} kbps`
                                );
                            }
                        }
                    },
                    mute() {
                        this.muted = !this.muted;
                        log('MutePlayback').info();
                        this.$refs.video.muted = this.muted;
                    },

                    playButtonCaption() {
                        if (this.isStopped())
                            return 'Play';
                        if (this.isStarting())
                            return 'Starting... ';
                        if (this.isPlaying())
                            return 'Stop';
                    },
                    isPlaying() {
                        return this.playState === PlayState.PLAYING;
                    },
                    isStarting() {
                        return this.playState === PlayState.STARTING;
                    },
                    isStopped() {
                        return this.playState === PlayState.STOPPED;
                    },
                    onVideoTrackChange() {
                        if (this.player) {
                            this.player.videoTrack = this.videoTrackId;
                        }
                    },
                    onAudioTrackChange() {
                        if (this.player) {
                            this.player.audioTrack = this.audioTrackId;
                        }
                    }
                },
            }).mount('#main');
        </script>
    </body>
</html>
